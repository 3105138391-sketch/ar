<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR 桌寵</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="info">請允許攝像頭權限，將手機對準桌面緩慢平移。出現綠色光圈後點擊屏幕放置。</div>
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let container, camera, scene, renderer;
        let controller, reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let petModel, mixer, clock;

        init();
        animate();

        function init() {
            container = document.createElement( 'div' );
            document.body.appendChild( container );
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

            // 添加光照，讓模型有立體感
            const light = new THREE.HemisphereLight( 0xffffff, 0xbbbbff, 1 );
            light.position.set( 0.5, 1, 0.25 );
            scene.add( light );

            // 初始化渲染器
            renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.xr.enabled = true;
            container.appendChild( renderer.domElement );

            // 加入 AR 按鈕
            document.body.appendChild( ARButton.createButton( renderer, { requiredFeatures: [ 'hit-test' ] } ) );

            // 載入模型
            const loader = new GLTFLoader();
            // 注意：確保你的模型檔案名為 model.glb 並放在同一個資料夾
            loader.load( 'model.glb', function ( gltf ) {
                petModel = gltf.scene;
                petModel.visible = false; 
                // 根據實際情況調整模型大小，0.1 代表縮小到 10%
                petModel.scale.set(0.1, 0.1, 0.1); 
                scene.add( petModel );

                // 播放第一個動畫
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(petModel);
                    mixer.clipAction(gltf.animations[0]).play();
                }
            });

            // 點擊事件：將寵物放到光圈位置
            function onSelect() {
                if ( reticle.visible && petModel ) {
                    petModel.position.setFromMatrixPosition( reticle.matrix );
                    // 讓寵物面向攝像頭
                    petModel.lookAt(camera.position); 
                    petModel.rotation.x = 0; // 保持直立
                    petModel.rotation.z = 0;
                    petModel.visible = true;
                }
            }

            controller = renderer.xr.getController( 0 );
            controller.addEventListener( 'select', onSelect );
            scene.add( controller );

            // 建立 AR 瞄準光圈 (Reticle)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry( 0.15, 0.2, 32 ).rotateX( - Math.PI / 2 ),
                new THREE.MeshBasicMaterial( { color: 0x00ff00 } )
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add( reticle );

            window.addEventListener( 'resize', onWindowResize );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            renderer.setAnimationLoop( render );
        }

        function render( timestamp, frame ) {
            if ( frame ) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // 請求射線檢測源
                if ( hitTestSourceRequested === false ) {
                    session.requestReferenceSpace( 'viewer' ).then( function ( referenceSpace ) {
                        session.requestHitTestSource( { space: referenceSpace } ).then( function ( source ) {
                            hitTestSource = source;
                        } );
                    } );
                    session.addEventListener( 'end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    } );
                    hitTestSourceRequested = true;
                }

                // 執行平面檢測
                if ( hitTestSource ) {
                    const hitTestResults = frame.getHitTestResults( hitTestSource );
                    if ( hitTestResults.length > 0 ) {
                        const hit = hitTestResults[ 0 ];
                        reticle.visible = true;
                        reticle.matrix.fromArray( hit.getPose( referenceSpace ).transform.matrix );
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // 更新動畫與渲染
            const delta = clock.getDelta();
            if ( mixer ) mixer.update( delta );
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
